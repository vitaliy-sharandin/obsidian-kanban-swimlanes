name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Build plugin
        run: |
          npm install
          npm run typecheck
          npm run lint
          npm run build

      - name: Validate release metadata
        run: |
          node -e "const m=require('./manifest.json'); const p=require('./package.json'); const tag=process.env.GITHUB_REF_NAME; if (m.version !== p.version || m.version !== tag) { console.error('Release tag, manifest version, and package version must match:', { tag, manifest: m.version, package: p.version }); process.exit(1); }"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --notes-file="release-notes.md" \
            main.js manifest.json styles.css
